<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <header>
        <h1>Robot Control Panel UwU</h1>
        <span id="status" class="offline">Disconnected</span>
    </header>

    <main>
        <!-- Gyroscope card -->
        <div class="card" id="gyro-card">
            <h2>Gyroscope</h2>
            <p>X: <span id="gx">--</span> °/s</p>
            <p>Y: <span id="gy">--</span> °/s</p>
            <p>Z: <span id="gz">--</span> °/s</p>
            <p>Temp: <span id="temp">--</span> °C</p>
        </div>

        <!-- Map card -->
        <div class="card" id="map-card">
            <h2>Map</h2>
            <canvas id="map"></canvas>
        </div>

        <!-- Controls card -->
        <div class="card" id="controls-card">
            <h2>Controls</h2>
            <div class="controls">
                <button id="btn-forward">▲</button>
                <button id="btn-left">◄</button>
                <button id="btn-stop">■</button>
                <button id="btn-right">►</button>
                <button id="btn-backward">▼</button>
            </div>
        </div>
    </main>

    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script>
        const socket = io();

        socket.on("connect", () => {
            document.getElementById("status").className = "online"
            document.getElementById("status").innerHTML = "Connected"
        });

        socket.on("disconnect", () => {
            document.getElementById("status").className = "offline"
            document.getElementById("status").innerHTML = "Disconnected"
        });

        socket.on("gyro", function(data) {
            document.getElementById("gx").innerHTML = data.gyro.x.toFixed(2)
            document.getElementById("gy").innerHTML = data.gyro.y.toFixed(2)
            document.getElementById("gz").innerHTML = data.gyro.z.toFixed(2)
            document.getElementById("temp").innerHTML = data.temp
        });
    
                // Mapping touches → boutons
        const keyMap = {
            "ArrowUp":    "forward",
            "ArrowDown":  "backward",
            "ArrowLeft":  "left",
            "ArrowRight": "right",
            " ":          "stop"
        }

        document.addEventListener("keydown", function(e) {
            const action = keyMap[e.key]
            if (action) {
                document.getElementById("btn-" + action).classList.add("active")
                socket.emit("command", {action: action, speed: 60})
            }
        })

        document.addEventListener("keyup", function(e) {
            const action = keyMap[e.key]
            if (action) {
                document.getElementById("btn-" + action).classList.remove("active")
                socket.emit("command", {action: "stop", speed: 0})
            }
        })
    </script>

</body>
</html>
