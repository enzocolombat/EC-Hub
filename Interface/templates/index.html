<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Control</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <h1>Robot Control Panel</h1>
        <span id="status" class="offline">Disconnected</span>
    </header>
    <main>
        <div class="card" id="gyro-card">
            <h2>Gyroscope</h2>
            <p>X: <span id="gx">--</span> °/s</p>
            <p>Y: <span id="gy">--</span> °/s</p>
            <p>Z: <span id="gz">--</span> °/s</p>
            <p>Temp: <span id="temp">--</span> °C</p>
        </div>
        <div class="card" id="map-card">
            <h2>Map</h2>
            <canvas id="map"></canvas>
        </div>
        <div class="card" id="controls-card">
            <h2>Controls</h2>
            <div class="controls">
                <button id="btn-forward">▲</button>
                <button id="btn-left">◄</button>
                <button id="btn-stop">■</button>
                <button id="btn-right">►</button>
                <button id="btn-backward">▼</button>
            </div>
        </div>
    </main>
    <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
    <script type="module" src="/static/robot.js"></script>
    <script type="module" src="/static/canvas.js"></script>
    <script type="module" src="/static/socket.js"></script>
</body>
</html>
